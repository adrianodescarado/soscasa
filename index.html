<style>

body{
font-family:Helvetica,Arial,sans-serif;
background:#f0f2f5;
margin:0;
padding:0;
}

.app-container{
max-width:600px;
margin:auto;
background:white;
min-height:100vh;
}

.app-header{
background:#0B1F3B;
color:white;
padding:16px;
font-size:20px;
font-weight:bold;
text-align:center;
}

.app-sub{
padding:12px;
text-align:center;
font-size:15px;
color:#333;
}

.app-highlight{
color:#0B1F3B;
font-weight:bold;
}

.fb-wrapper{
padding:12px;
}

.fb-header{
display:flex;
justify-content:space-between;
font-size:14px;
color:#65676b;
margin-bottom:10px;
}

.fb-title{
font-weight:600;
color:#050505;
}

.fb-comment{
display:flex;
margin-bottom:14px;
opacity:0;
transform:translateY(10px);
transition:.4s;
}

.fb-comment.show{
opacity:1;
transform:translateY(0);
}

.fb-avatar{
width:36px;
height:36px;
border-radius:50%;
margin-right:8px;
}

.fb-body{
flex:1;
}

.fb-bubble{
background:#f0f2f5;
padding:8px 12px;
border-radius:18px;
}

.fb-name{
font-weight:600;
font-size:13px;
}

.fb-text{
font-size:14px;
}

.fb-meta{
font-size:12px;
color:#65676b;
margin-top:2px;
}

.fb-meta span{
margin-right:12px;
cursor:pointer;
}

.fb-meta span:hover{
text-decoration:underline;
}

.fb-like-count{
font-size:12px;
color:#65676b;
margin-top:2px;
}

.fb-replies{
margin-left:44px;
margin-top:6px;
}

.fb-load{
cursor:pointer;
color:#65676b;
font-size:14px;
margin-top:10px;
}

.fb-load:hover{
text-decoration:underline;
}

.fb-verified{
color:#1877f2;
margin-left:4px;
}

</style>

</head>

var visible = 0;

function renderComment(c){

return '<div class="fb-comment show">'+
'<img class="fb-avatar" src="'+c.avatar+'">'+
'<div class="fb-body">'+
'<div class="fb-bubble">'+
'<div class="fb-name">'+c.name+'</div>'+
'<div class="fb-text">'+c.text+'</div>'+
'</div>'+
'<div class="fb-meta">'+
'<span>Curtir</span>'+
'<span>Responder</span>'+
'<span>'+c.time+'</span>'+
'</div>'+
'<div class="fb-like-count">👍 ❤️ '+c.likes+'</div>'+
'</div>'+
'</div>';

}

function loadMore(){

var container=document.getElementById("fbComments");

for(var i=0;i<5;i++){

if(visible>=commentsData.length) return;

container.innerHTML += renderComment(commentsData[visible]);

visible++;

}

}

function init(){

visible=0;

document.getElementById("fbComments").innerHTML="";

loadMore();

}

window.onload=init;

setTimeout(init,300);

setTimeout(init,800);
