var visible = 0;

function renderComment(c){

var verifiedIcon = c.verified ? '<span style="color:#1877f2;margin-left:4px;">✔</span>' : '';
var pinnedLabel = c.pinned ? '<div style="color:#1877f2;font-size:12px;font-weight:bold;margin-bottom:4px;">Comentário fixado</div>' : '';

var repliesHtml = '';

if(c.replies && c.replies.length > 0){
repliesHtml = '<div class="fb-replies">';
c.replies.forEach(function(r){

var replyVerified = r.verified ? '<span style="color:#1877f2;margin-left:4px;">✔</span>' : '';

repliesHtml +=
'<div class="fb-comment show">'+
'<img class="fb-avatar" src="'+r.avatar+'">'+
'<div class="fb-body">'+
'<div class="fb-bubble">'+
'<div class="fb-name">'+r.name+ replyVerified +'</div>'+
'<div class="fb-text">'+r.text+'</div>'+
'</div>'+
'<div class="fb-meta">'+
'<span>Curtir</span>'+
'<span>Responder</span>'+
'<span>'+r.time+'</span>'+
'</div>'+
'<div class="fb-like-count">👍 '+r.likes+'</div>'+
'</div>'+
'</div>';

});
repliesHtml += '</div>';
}

return '<div class="fb-comment show">'+
'<img class="fb-avatar" src="'+c.avatar+'">'+
'<div class="fb-body">'+
pinnedLabel+
'<div class="fb-bubble">'+
'<div class="fb-name">'+c.name+ verifiedIcon +'</div>'+
'<div class="fb-text">'+c.text+'</div>'+
'</div>'+
'<div class="fb-meta">'+
'<span>Curtir</span>'+
'<span>Responder</span>'+
'<span>'+c.time+'</span>'+
'</div>'+
'<div class="fb-like-count">👍 ❤️ '+c.likes+'</div>'+
repliesHtml+
'</div>'+
'</div>';
}

function loadCommentsAuto(){
var container=document.getElementById("fbComments");

if(visible>=commentsData.length) return;

container.innerHTML += renderComment(commentsData[visible]);
visible++;

setTimeout(loadCommentsAuto, 2000);
}

window.onload=function(){
visible=0;
document.getElementById("fbComments").innerHTML="";
loadCommentsAuto();
simulateViewers();
simulatePurchases();
};

function simulateViewers(){

var random = Math.floor(Math.random() * (190 - 120) + 120);
viewers.innerHTML="🔴 "+random+" pessoas estão vendo essa página agora";
},4000);
}

function simulatePurchases(){
